<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="heading">
        <h1> STOP WATCH </h1>
    </div>

    <div class="stopwatch">
        <div class="watch">
           <h1 id="time">00:00</h1>
           <button class="button1" style="font-weight: bold; font-family: times new roman;">START</button>
           <button class="button2" style="font-weight: bold; font-family: times new roman;">STOP</button>
           <button class="button3" style="font-weight: bold; font-family: times new roman;">RESET</button>
        </div>
    </div>
    
    
</body>
<script src="Watch.js"></script>
</html>
